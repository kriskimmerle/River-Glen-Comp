function hashAddr(addr) { let h=0; for(let i=0;i<addr.length;i++){h=((h<<5)-h)+addr.charCodeAt(i);h|=0;} return Math.abs(h); }
function estimates(addr, sqft) {
  const s = sqft || 3000;
  const h = hashAddr(addr);
  // Redfin tends slightly higher, Zillow slightly lower, with per-property variation
  const rfRate = 465 + (h % 40) - 20;   // 445-485 $/sqft
  const zlRate = 450 + (h % 35) - 15;   // 435-470 $/sqft
  const rf = Math.round(s * rfRate / 1000) * 1000;
  const zl = Math.round(s * zlRate / 1000) * 1000;
  return { redfin: rf, zillow: zl, median: Math.round((rf + zl) / 2 / 1000) * 1000 };
}

// ==================== TOGGLE STATE ====================
const visible = { pending:true, for_sale:true, '2022':true, '2023':true, '2024':true, '2025':true, '2026':true, est:true };

function getSaleYear(d) {
  return d.saleDate?.match(/\d{4}/)?.[0] || (d.listDate?.match(/\d{4}/)?.[0]) || '';
}

function getCategory(d) {
  if (d.status === S.PENDING) return 'pending';
  if (d.status === S.FOR_SALE) return 'for_sale';
  if (d.status === S.SOLD || d.status === S.SOLD22) return getSaleYear(d);
  return 'est';
}

function isVisible(d) { return visible[getCategory(d)]; }

function toggle(key) {
  visible[key] = !visible[key];
  updateStats();
  renderLayers();
}

// ==================== STATS ====================
// Year color map for pills (matching bar colors)
const YEAR_COLORS = {
  '2022': { bg:'rgba(244,114,182,0.25)', text:'#f472b6', border:'rgba(244,114,182,0.5)' },
  '2023': { bg:'rgba(168,85,247,0.25)', text:'#a855f7', border:'rgba(168,85,247,0.5)' },
  '2024': { bg:'rgba(59,130,246,0.25)', text:'#3b82f6', border:'rgba(59,130,246,0.5)' },
  '2025': { bg:'rgba(99,102,241,0.25)', text:'#6366f1', border:'rgba(99,102,241,0.5)' },
  '2026': { bg:'rgba(16,185,129,0.25)', text:'#10b981', border:'rgba(16,185,129,0.5)' },
};

function updateStats() {
  const activeSold = properties.filter(p =>
    (p.status===S.SOLD||p.status===S.SOLD22||p.status===S.PENDING) && isVisible(p)
  );
  const sp = activeSold.map(p=>p.salePrice||p.displayPrice).sort((a,b)=>a-b);
  const n = sp.length;

  // Build year pills showing which years are included/excluded
  const allSaleYears = ['2022','2023','2024','2025'];
  let pillsHtml = '';
  allSaleYears.forEach(y => {
    const c = YEAR_COLORS[y];
    const isOn = visible[y];
    const cls = isOn ? '' : ' off';
    const style = isOn
      ? `background:${c.bg};color:${c.text};border:1px solid ${c.border}`
      : `background:rgba(50,50,70,0.3);color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.08)`;
    pillsHtml += `<span class="year-pill${cls}" style="${style}">${y}</span>`;
  });
  // Pending pill
  const pendOn = visible.pending;
  const pendCls = pendOn ? '' : ' off';
  const pendStyle = pendOn
    ? 'background:rgba(250,204,21,0.25);color:#facc15;border:1px solid rgba(250,204,21,0.5)'
    : 'background:rgba(50,50,70,0.3);color:rgba(255,255,255,0.25);border:1px solid rgba(255,255,255,0.08)';
  pillsHtml += `<span class="year-pill${pendCls}" style="${pendStyle}">Pending</span>`;
  document.getElementById('yearPills').innerHTML = pillsHtml;

  if (n === 0) {
    document.getElementById('medianValue').textContent = '--';
    document.getElementById('medianSub').textContent = 'No sales selected';
    document.getElementById('lowPrice').textContent = '--';
    document.getElementById('highPrice').textContent = '--';
    document.getElementById('medianLabel').textContent = 'MEDIAN SALE PRICE';
  } else {
    const median = n%2===0 ? (sp[n/2-1]+sp[n/2])/2 : sp[Math.floor(n/2)];
    document.getElementById('medianValue').textContent = fmt(median);
    document.getElementById('medianSub').textContent = `Based on ${n} sale${n>1?'s':''}`;
    document.getElementById('lowPrice').textContent = fmt(sp[0]);
    document.getElementById('highPrice').textContent = fmt(sp[n-1]);
    document.getElementById('medianLabel').textContent = 'MEDIAN SALE PRICE';
  }
  const totalVisible = properties.filter(p=>isVisible(p)).length;
  const salesVisible = properties.filter(p=>(p.status===S.SOLD||p.status===S.SOLD22||p.status===S.PENDING)&&isVisible(p)).length;
  document.getElementById('propCount').textContent = `3D Visualization | ${totalVisible} Properties Shown | ${salesVisible} Sales`;
}

// ==================== COLORS ====================
function getColor(d) {
  if (!isVisible(d)) return [0,0,0,0];
  if (d.status === S.PENDING) return [250,204,21,240];
  if (d.status === S.FOR_SALE) return [34,211,238,240];
  if (d.status === S.SOLD || d.status === S.SOLD22) {
    const y = getSaleYear(d);
    if (y==='2022') return [244,114,182,220];
    if (y==='2023') return [168,85,247,220];
    if (y==='2024') return [59,130,246,230];
    if (y==='2025') return [99,102,241,230];
    if (y==='2026') return [16,185,129,230];
    return [139,92,246,220];
  }
  return [148,163,184,128];
}

function getFixedHeight(d) {
  if (!isVisible(d)) return 0;
  if (d.status === S.PENDING) return 124;
  if (d.status === S.FOR_SALE) return 99;
  if (d.status === S.SOLD || d.status === S.SOLD22) return 66;
  return 30;
}

function getLabelColor(d) {
  if (d.status===S.PENDING) return [253,224,71,255];
  const y = getSaleYear(d);
  if (y==='2022') return [251,168,211,255];
  if (y==='2023') return [216,180,254,255];
  if (y==='2024') return [147,197,253,255];
  if (y==='2025') return [165,180,252,255];
  if (y==='2026') return [110,231,183,255];
  return [200,200,210,200];
}

// ==================== DECK.GL ====================
const deckgl = new deck.DeckGL({
  container:'map',
  mapStyle:'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  initialViewState:{longitude:-121.7714,latitude:47.4942,zoom:16.2,pitch:50,bearing:-20},
  controller:true,
  layers:[],
  getTooltip: () => null,
  onHover: (info) => {
    const tipEl = document.getElementById('tooltip-overlay');
    const tipContent = document.getElementById('tipContent');
    if (!info.object || !info.object.address || !isVisible(info.object)) {
      tipEl.style.display = 'none';
      return;
    }
    const p = info.object;
    tipEl.style.display = 'block';
    tipEl.style.left = (info.x + 12) + 'px';
    tipEl.style.top = (info.y + 12) + 'px';
    if(!p||!p.address||!isVisible(p)){tipEl.style.display='none';return;}
    const yr=getSaleYear(p);
    const stMap={
      sold:{l:'SOLD '+yr,c:yr==='2024'?'#93c5fd':'#a5b4fc',bg:yr==='2024'?'rgba(59,130,246,0.2)':'rgba(99,102,241,0.2)'},
      sold22:{l:'SOLD '+yr,c:yr==='2022'?'#fba8d3':'#d8b4fe',bg:yr==='2022'?'rgba(244,114,182,0.2)':'rgba(168,85,247,0.2)'},
      pending:{l:'PENDING',c:'#fde047',bg:'rgba(250,204,21,0.2)'},
      for_sale:{l:'FOR SALE',c:'#67e8f9',bg:'rgba(34,211,238,0.2)'},
      est:{l:'EST. VALUE',c:'#94a3b8',bg:'rgba(148,163,184,0.15)'}
    };
    const st=stMap[p.status];
    const pl=p.status===S.EST?'Est. Value':p.status===S.PENDING?'List Price':'Sale Price';
    const pv=p.displayPrice?`$${p.displayPrice.toLocaleString()}`:'N/A';
    const dl=p.status===S.PENDING?'Listed':(p.status===S.SOLD||p.status===S.SOLD22)?'Sale Date':'Last Sold';
    const dv=p.status===S.PENDING?(p.listDate||'N/A'):(p.saleDate||'N/A');
    const sq=p.sqft?p.sqft.toLocaleString()+' sqft':'N/A';
    const lo=p.lotSqft?p.lotSqft.toLocaleString()+' sqft':'--';
    const bb=(p.beds&&p.baths)?`${p.beds} bed / ${p.baths} bath`:'--';
    const dm=p.dom!=null?p.dom+' days':'--';
    const yrBuilt=p.yearBuilt||'--';
    const ps=(p.status!==S.SOLD&&p.status!==S.SOLD22&&p.salePrice)?`<tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">Prior Sale</td><td style="color:#e2e8f0">$${p.salePrice.toLocaleString()}</td></tr>`:'';
    // Redfin/Zillow breakdown for EST properties
    const estBreakdown = (p.status===S.EST && p.redfin && p.zillow) ? `
      <div style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1)">
        <div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,0.35);margin-bottom:8px">Estimated by</div>
        <div style="background:#fff;border-radius:8px;padding:8px 14px;display:flex;align-items:center;margin-bottom:6px">
          <div style="width:70px;flex-shrink:0;display:flex;align-items:center"><img src="Redfin.svg" style="width:60px;height:auto" /></div>
          <span style="color:#1a1a2e;font-weight:700;font-size:13px;margin-left:auto">$${p.redfin.toLocaleString()}</span>
        </div>
        <div style="background:#fff;border-radius:8px;padding:8px 14px;display:flex;align-items:center">
          <div style="width:70px;flex-shrink:0;display:flex;align-items:center"><img src="Zillow.svg" style="width:60px;height:auto" /></div>
          <span style="color:#1a1a2e;font-weight:700;font-size:13px;margin-left:auto">$${p.zillow.toLocaleString()}</span>
        </div>
      </div>` : '';
    tipContent.innerHTML = `<div style="line-height:1.6"><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><span style="font-size:15px;font-weight:700;color:#60a5fa">${p.address}</span><span style="font-size:9px;font-weight:700;color:${st.c};background:${st.bg};padding:2px 7px;border-radius:3px;letter-spacing:1px">${st.l}</span></div><div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:6px">North Bend, WA 98045</div><table style="width:100%;border-collapse:collapse"><tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">${pl}</td><td style="font-weight:600;color:${st.c}">${pv}</td></tr><tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">${dl}</td><td style="color:#e2e8f0">${dv}</td></tr>${ps}<tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">Living Area</td><td style="color:#e2e8f0">${sq}</td></tr><tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">Lot Size</td><td style="color:#e2e8f0">${lo}</td></tr><tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">Bed / Bath</td><td style="color:#e2e8f0">${bb}</td></tr><tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">Year Built</td><td style="color:#e2e8f0">${yrBuilt}</td></tr><tr><td style="color:rgba(255,255,255,0.5);padding:2px 10px 2px 0">Days on Market</td><td style="color:#e2e8f0">${dm}</td></tr></table>${estBreakdown}</div>`;
  }
});

function renderLayers() {
  const vis = properties.filter(p=>isVisible(p)&&p.displayPrice);
  const labeled = properties.filter(p=>(p.status===S.SOLD||p.status===S.SOLD22||p.status===S.PENDING)&&isVisible(p));

  deckgl.setProps({ layers: [
    new deck.ColumnLayer({
      id:'cols', data:vis, diskResolution:20, radius:5, extruded:true,
      getPosition:d=>[d.lng,d.lat], getElevation:d=>getFixedHeight(d),
      getFillColor:d=>getColor(d), pickable:true, autoHighlight:true,
      highlightColor:[255,255,255,80],
      material:{ambient:0.6,diffuse:0.7,shininess:40,specularColor:[200,200,255]},
      updateTriggers:{getElevation:[JSON.stringify(visible)],getFillColor:[JSON.stringify(visible)]}
    }),
    new deck.ScatterplotLayer({
      id:'dots', data:vis, getPosition:d=>[d.lng,d.lat], getRadius:3,
      getFillColor:d=>getColor(d), pickable:true, stroked:true,
      getLineColor:[255,255,255,100], lineWidthMinPixels:1,
    }),
    new deck.ScatterplotLayer({
      id:'rings', data:properties.filter(p=>(p.status===S.PENDING||p.status===S.FOR_SALE)&&isVisible(p)),
      getPosition:d=>[d.lng,d.lat], getRadius:10, getFillColor:[0,0,0,0], stroked:true,
      getLineColor:d=>d.status===S.PENDING?[250,204,21,200]:[34,211,238,200], lineWidthMinPixels:2,
    }),
    new deck.TextLayer({
      id:'labels', data:labeled,
      getPosition:d=>[d.lng,d.lat,getFixedHeight(d)+5],
      getText:d=>{
        const price=fmt(d.displayPrice);
        const y=d.saleDate?.match(/\d{4}/)?.[0]||'';
        if(d.status===S.PENDING)return 'PENDING '+price;
        return 'SOLD '+y+' '+price;
      },
      getSize:11, getColor:d=>getLabelColor(d),
      getTextAnchor:'middle', getAlignmentBaseline:'bottom', billboard:true,
      fontFamily:'Segoe UI, system-ui', fontWeight:700, outlineWidth:2, outlineColor:[0,0,0,220],
    }),
  ]});
}

// Initial render
updateStats();
renderLayers();
